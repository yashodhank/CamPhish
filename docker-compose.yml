services:
  app:
    build: .
    container_name: camphish-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - camphish_data:/app/data
      - ./templates:/app/templates:ro
    environment:
      - DATA_DIR=/app/data
      - TEMPLATES_DIR=/app/templates
      - FRONTEND_DIR=/app/frontend/dist
      - LISTEN_ADDR=0.0.0.0:8080
      - DATABASE_URL=sqlite:///app/data/camphish.db?mode=rwc
      - TUNNEL_LINK=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - camphish-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: camphish-cloudflared
    restart: unless-stopped
    profiles: [cloudflared]
    command: ["tunnel", "--url", "http://app:8080", "--no-autoupdate"]
    depends_on:
      app:
        condition: service_healthy
    networks:
      - camphish-net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: camphish-ngrok
    restart: unless-stopped
    profiles: [ngrok]
    command: ["http", "app:8080", "--log=stdout"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - camphish-net

volumes:
  camphish_data:

networks:
  camphish-net:
    driver: bridge
