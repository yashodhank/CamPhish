<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/dashboard>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /data/logs/apache_error.log
    CustomLog /data/logs/apache_access.log combined

    RewriteEngine On
    RewriteRule ^/dashboard$ /dashboard/index.php [L]
    RewriteCond %{REQUEST_URI} !^/(health|post|location|ip|debug_log|index)\.php$
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /index.php [QSA,L]
</VirtualHost>
