name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Check if this is a tag push
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          else
            # Auto-increment patch version from latest tag
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.0.0")
            LATEST_NUM="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_NUM"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION"

      - name: Create tag
        if: steps.version.outputs.is_new == 'true' && github.ref == 'refs/heads/master'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "## $VERSION" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --oneline --no-decorate | head -20 >> CHANGELOG.md
          else
            echo "## $VERSION" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --oneline --no-decorate "$PREV"..HEAD | head -30 >> CHANGELOG.md
          fi
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.is_new == 'true'
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${{ needs.version.outputs.version }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Install pack CLI
        uses: buildpacks/github-actions/setup-pack@v5

      - name: Build with pack (alternative)
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          pack build ghcr.io/${{ github.repository }}:pack-${VERSION} \
            --builder heroku/builder:24 \
            --path . \
            --trust-builder \
            --publish \
            --env "VERSION=${VERSION}" || echo "Pack build skipped (frontend not in builder scope)"
