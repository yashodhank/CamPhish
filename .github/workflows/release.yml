name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v2.2.0)'
        required: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            SEMVER="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            SEMVER="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.1.0")
            LATEST_NUM="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_NUM"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            SEMVER="${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION"

      - name: Bump version strings
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"

          # backend/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$SEMVER\"/" backend/Cargo.toml

          # frontend/package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" frontend/package.json

          # Dockerfile
          sed -i "s/^ARG VERSION=.*/ARG VERSION=$SEMVER/" Dockerfile

          # docker-compose.yml
          sed -i "s/image: camphish:\${VERSION:-.*}/image: camphish:\${VERSION:-$SEMVER}/" docker-compose.yml

          # .env.example
          sed -i "s/^VERSION=.*/VERSION=$SEMVER/" .env.example

          # docs/CHANGELOG.md
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## $SEMVER" > /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo "**Release date:** $(date +%Y-%m-%d)" >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          if [ -n "$PREV" ]; then
            git log --oneline --no-decorate "$PREV"..HEAD | head -50 >> /tmp/new_changelog.md
          else
            git log --oneline --no-decorate | head -50 >> /tmp/new_changelog.md
          fi
          echo "" >> /tmp/new_changelog.md
          cat docs/CHANGELOG.md >> /tmp/new_changelog.md
          cp /tmp/new_changelog.md docs/CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/Cargo.toml frontend/package.json Dockerfile docker-compose.yml .env.example docs/CHANGELOG.md
          git commit -m "chore: bump version to $SEMVER" || echo "Nothing to commit"

      - name: Create tag
        if: steps.version.outputs.is_new == 'true' && github.ref == 'refs/heads/master'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Push version bump commit
        run: git push origin HEAD:master || echo "No push needed"

      - name: Generate changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "## $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          if [ -n "$PREV" ]; then
            git log --oneline --no-decorate "$PREV"..HEAD | head -30 >> CHANGELOG.md
          else
            git log --oneline --no-decorate | head -30 >> CHANGELOG.md
          fi
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.is_new == 'true'
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${{ needs.version.outputs.version }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
