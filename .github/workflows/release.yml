name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v2.2.0)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            SEMVER="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            SEMVER="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.1.0")
            LATEST_NUM="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_NUM"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            SEMVER="${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION"

      - name: Bump version strings
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"
          sed -i "s/^version = \".*\"/version = \"$SEMVER\"/" backend/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" frontend/package.json
          sed -i "s/^ARG VERSION=.*/ARG VERSION=$SEMVER/" Dockerfile
          sed -i "s/image: camphish:\${VERSION:-.*}/image: camphish:\${VERSION:-$SEMVER}/" docker-compose.yml
          sed -i "s/^VERSION=.*/VERSION=$SEMVER/" .env.example
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## $SEMVER" > /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          echo "**Release date:** $(date +%Y-%m-%d)" >> /tmp/new_changelog.md
          echo "" >> /tmp/new_changelog.md
          if [ -n "$PREV" ]; then
            git log --oneline --no-decorate "$PREV"..HEAD | head -50 >> /tmp/new_changelog.md
          else
            git log --oneline --no-decorate | head -50 >> /tmp/new_changelog.md
          fi
          echo "" >> /tmp/new_changelog.md
          cat docs/CHANGELOG.md >> /tmp/new_changelog.md
          cp /tmp/new_changelog.md docs/CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/Cargo.toml frontend/package.json Dockerfile docker-compose.yml .env.example docs/CHANGELOG.md
          git commit -m "chore: bump version to $SEMVER" || echo "Nothing to commit"

      - name: Create tag
        if: steps.version.outputs.is_new == 'true' && github.ref == 'refs/heads/master'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Push version bump commit
        run: git push origin HEAD:master || echo "No push needed"

      - name: Generate changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "## $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            git log --oneline --no-decorate "$PREV"..HEAD | head -30 >> CHANGELOG.md
          else
            git log --oneline --no-decorate | head -30 >> CHANGELOG.md
          fi
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.version.outputs.is_new == 'true'
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: true

  build-and-push:
    needs: version
    if: needs.version.outputs.is_new == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          build-args: |
            VERSION=${{ needs.version.outputs.semver }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

    outputs:
      amd64_digest: ${{ steps.build.outputs.digest }}
      arm64_digest: ${{ steps.build.outputs.digest }}

  merge-manifest:
    needs: [version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      - name: Create and push multi-arch manifest
        run: |
          # Generate tag list from metadata
          TAGS="${{ steps.meta.outputs.tags }}"
          # Read digests from exported files
          DIGESTS=""
          for f in /tmp/digests/*; do
            DIGESTS="$DIGESTS ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:$(basename $f)"
          done
          # Create manifest for each tag
          echo "$TAGS" | tr ',' '\n' | while read tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create \
                -t "$tag" \
                $(printf '%s ' $DIGESTS)
            fi
          done
