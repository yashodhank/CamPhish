name: CI

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

jobs:
  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check Rust backend
        working-directory: backend
        run: cargo check

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Check React frontend
        working-directory: frontend
        run: |
          npm install
          npx tsc --noEmit

  check-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate templates
        run: |
          count=0
          for f in templates/*.html; do
            if [ -f "$f" ]; then
              count=$((count + 1))
              echo "✓ $f"
            fi
          done
          echo "Total templates: $count"
          if [ "$count" -lt 10 ]; then
            echo "ERROR: Expected at least 10 templates"
            exit 1
          fi
      - name: Check recon.js exists
        run: test -f templates/recon.js && echo "✓ recon.js exists" || (echo "ERROR: recon.js missing" && exit 1)

  build-docker:
    needs: [check-rust, check-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: camphish:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
