name: CI

on:
  push:
    branches: [master, feature/*, feature/**/*]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: read

jobs:
  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check Rust backend
        working-directory: backend
        run: cargo check

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Check React frontend
        working-directory: frontend
        run: |
          npm install
          npx tsc --noEmit

  check-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate templates
        run: |
          count=0
          for f in templates/*.html; do
            if [ -f "$f" ]; then
              count=$((count + 1))
              echo "✓ $f"
            fi
          done
          echo "Total templates: $count"
          if [ "$count" -lt 10 ]; then
            echo "ERROR: Expected at least 10 templates"
            exit 1
          fi
      - name: Check recon.js exists
        run: 'test -f templates/recon.js && echo "✓ recon.js exists" || (echo "ERROR: recon.js missing" && exit 1)'

  build-docker:
    needs: [check-rust, check-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image (amd64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: camphish:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On master branch push (non-PR), also push a latest SHA-tagged image
  build-push-sha:
    needs: [check-rust, check-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=nightly
      - name: Build and push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
