[_]
schema-version = "0.2"
id = "net.techchip.camphish"
name = "CamPhish"
version = "3.0.0"
authors = ["TechChip"]
documentation-url = "https://github.com/yashodhank/CamPhish"
source-url = "https://github.com/yashodhank/CamPhish"

[[_.licenses]]
type = "MIT"

[io.buildpacks]
builder = "heroku/builder:24"

[[io.buildpacks.build.env]]
name = "HEROKU_PHP_DEFAULT_WEB"
value = "apache2"

[_.metadata]
deployment_modes = ["local", "self-hosted", "coolify", "cloudflare"]
tunnel_options = ["ngrok", "cloudflared", "none"]
proxy_options = ["caddy", "traefik", "nginx"]
