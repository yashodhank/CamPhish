<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
    </Directory>

    <If "-f '/data/config/.htpasswd'">
        <Location />
            AuthType Basic
            AuthName "CamPhish Dashboard"
            AuthUserFile /data/config/.htpasswd
            Require valid-user
        </Location>

        <LocationMatch "^/api/">
            AuthType Basic
            AuthName "CamPhish Dashboard"
            AuthUserFile /data/config/.htpasswd
            Require valid-user
        </LocationMatch>
    </If>
    <Else>
        <Directory /var/www/html>
            Require all granted
        </Directory>
    </Else>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
