# CamPhish for Coolify v4+ — Docker Compose
# =============================================================================
# Designed for Coolify v4+ panel with Traefik or Caddy proxy.
# Uses Coolify magic environment variables for auto FQDN and secrets.
# No tunnel service — Coolify's proxy handles external access + SSL.
# =============================================================================

services:
  camphish:
    image: ghcr.io/yashodhank/camphish:latest
    container_name: camphish-app
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      # Coolify magic vars — auto-generated by panel
      # These are NOT set in .env — Coolify injects them at deploy time
      - SERVICE_FQDN_CAMPHISH_8080
      - SERVICE_PASSWORD_CAMPHISH_ACCESS

      # Application config
      - DATA_DIR=/app/data
      - TEMPLATES_DIR=/app/templates
      - FRONTEND_DIR=/app/frontend/dist
      - LISTEN_ADDR=0.0.0.0:8080
      - RUST_LOG=${RUST_LOG:-info}
      - GRACEFUL_SHUTDOWN=true
      - ENABLE_COMPRESSION=true
      - ENABLE_TEMPLATE_CACHE=true

      # Coolify FQDN passed through to templates as tunnel URL
      # Templates will use this as their forwarding link
      - TUNNEL_URL=${SERVICE_FQDN_CAMPHISH_8080:-${COOLIFY_URL:-}}

      # Access code — set in Coolify dashboard env vars, or auto-generated
      - CAMPHISH_ACCESS_SEED=${CAMPHISH_ACCESS_SEED:-}

      # TrailBase (optional) — set URL and API key if using
      - TRAILBASE_URL=${TRAILBASE_URL:-}
      - TRAILBASE_API_KEY=${TRAILBASE_API_KEY:-}
    volumes:
      - camphish_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # =========================================================================
  # TrailBase — OPTIONAL. Remove this block if not needed.
  # =========================================================================
