  #     - ADMIN_PASSWORD=${SERVICE_PASSWORD_TRAILBASE_ADMIN:-changeme}
  #     - SERVICE_PASSWORD_TRAILBASE_ADMIN
  #   volumes:
  #     - trailbase_data:/app/traildepot
  #     - ./trailbase/schema:/schema:ro
  #   entrypoint:
  #     - /bin/sh
  #     - -c
  #     - |
  #       mkdir -p /app/traildepot/migrations
  #       cp /schema/*.sql /app/traildepot/migrations/ 2>/dev/null
  #       exec /app/trail run
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/_/admin/ || exit 1"]
  #     interval: 15s
